name: astrbot_plugin_vrc_friend_radar
display_name: VRChat好友雷达
short_desc: VRChat 好友上线/状态/地图切换监控与播报，支持邀请审批、灵魂画像、同房提醒等。
desc: 监控 VRChat 好友上线、下线、状态变化与地图切换，并将变化合并播报到指定群聊；支持通知/邀请/好友请求 IM 端审批、灵魂画像与缘分分析。
support_platforms:
  - aiocqhttp
help: |
  功能说明：
  - VRChat 登录与持久化会话恢复（支持邮箱/TOTP/Recovery Code 2FA）
  - 同步好友/搜索好友/搜索世界/世界信息查询
  - 监控好友状态、签名、地图变化，合并播报到通知群
  - 同房提醒（可筛选仅推送"可加入"实例）
  - VRChat 站内通知（好友请求/世界邀请）IM 端审批闭环
  - 灵魂画像、人设、命运指引、缘分签、世界热度统计、自动日报
  - 监控分组（tag），不同群订阅不同分组
  - 状态签名关键词订阅，关键字触发 @ 订阅者
  - 自适应轮询（依据在线人数动态调速）
  - 事件导出 CSV/JSON、周报

  管理员命令（在群内执行）：
  /vrc状态 - 查看插件运行状态
  /vrc测试 - 插件在线自测
  /vrc帮助 - 展示命令速查（建议首次使用）
  /vrc推送测试 - 向通知群发送一条测试播报
  /vrc绑定通知群 - 将当前群绑定为通知群
  /vrc解绑通知群 - 将当前群从通知群移除
  /vrc通知群 - 查看通知群列表
  /vrc添加监控 名字或usr_xxx [| tag] - 添加监控好友，可选打 tag
  /vrc删除监控 名字或usr_xxx - 删除监控好友
  /vrc监控列表 - 查看监控好友及其 tag
  /vrc监控分组 tag 群号 - 将 tag 绑定到指定通知群
  /vrc分组解绑 tag - 取消 tag 的群绑定
  /vrc分组列表 - 查看 tag→群 的分组规则
  /vrc签名订阅 关键词 - 当监控好友状态签名含关键词时 @ 自己
  /vrc签名退订 关键词
  /vrc签名订阅列表
  /vrc隐私 不显示位置 - 当前群只显示状态不显示 location
  /vrc隐私 显示位置 - 还原
  /vrc添加监控序号 N - 从最近一次好友搜索结果中按序号添加监控
  /vrc同步好友 - 同步好友缓存
  /vrc好友列表 [页码] - 查看缓存好友列表
  /vrc在线好友 [页码] - 查看当前缓存中的在线好友
  /vrc检测变化 - 手动检测好友变化
  /vrc同房情况 - 查看当前同房分组
  /vrc生成日报 [推送] - 生成日报；参数"推送"时发送到通知群
  /vrc生成周报 - 生成近 7 天监控周报
  /vrc导出事件 [天数] - 以 CSV 形式导出最近事件
  /vrc通知中心 - 查看 VRChat 站内通知（好友请求/邀请）
  /vrc通知审批 编号 同意/拒绝
  /vrc接受邀请 编号
  /vrc拒绝邀请 编号
  /vrc邀请 名字或usr_xxx [| worldId:instanceId] - 邀请某位好友到你当前实例
  /vrc最近事件 - 查看最近变化事件
  /vrc公共加好友 开启|关闭 - 允许/禁止普通成员发起 /vrc加好友
  /vrc自适应轮询 开启|关闭 [min_s] [max_s] - 启停自适应轮询
  /vrc解绑登录 - 清除本地持久化登录态
  /vrc登录 用户名 密码 - 私聊 Bot 发起登录
  /vrc验证码 123456 - 私聊 Bot 提交 2FA 验证码

  所有人可用命令：
  /vrc灵魂画像 某某 - 对某个人物进行一次总结
  /vrc人设 某某 - 仅输出人设文本
  /命运指引 某某 - 仅输出命运指引
  /vrc缘分 某某 - 分析最近同行人
  /vrc戳 某某 | emojiId - 戳一下好友（VRChat Boop，只能带 emoji，不支持文字；emojiId 可省略）
  /vrc资料 某某 - 查看用户 VRChat 公开资料与头像
  /vrc搜索好友 关键词 [页码] - 在本地好友缓存中模糊搜索
  /vrc搜索地图 关键词 - 按地图名模糊搜索 VRChat 世界
  /vrc热门世界 [N] - 今日热门世界 Top N
  /vrc加好友 名字或usr_xxx - 让机器人向目标发好友请求（需管理员开启）

  B 站本地解析（所有人可用）：
  /bili解析 BV号 | av号 | 链接 - 返回视频直链（两步法 pagelist→playurl，platform=html5）
  /bili封面 BV号 | 链接 - 返回视频封面
version: 0.2.3
